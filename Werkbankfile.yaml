disallow_cloud: true
project:
  name: "Werkbank"
  id: "werkbank"

services:
  - name: "api"
    modes:
      local:
        port: 7090

  - name: "ui"
    modes:
      local:
        port: 5173

http:
  - path_prefixes:
      - /api
      - /oauth
    external_domains:
      - "**.werkbank.werkbank.space"
      - "wbcloud-dev-juliusbabies-midnight.dev.wbspace.app"
      - "*.wbcloud-dev-juliusbabies-midnight.dev.wbspace.app"
    target_service: api
    priority: 200
  - description: "Werkbank userspace"
    domains: null
    external_domains:
      - "**.wbcloud-dev-juliusbabies-midnight.dev.wbspace.app"
    target_service: api
    priority: 50
  - description: "Werkbank Cloud UI"
    path_prefixes:
      - /
    external_domains:
      - "*.wbcloud-dev-juliusbabies-midnight.dev.wbspace.app"
      - "wbcloud-dev-juliusbabies-midnight.dev.wbspace.app"
    target_service: ui
    priority: 100

extra_certificate_directories:
  - "data/certificates"

dependencies:
  postgres:
    18:
      databases: []
  jaeger: true