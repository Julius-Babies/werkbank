name: build_server.yml
on:
  push:
    branches: [ main ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v6
        name: Checkout
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Build
        run: bun build
      - name: Rename artifact
        run: mv build web_build
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: web/web_build
          name: web_build

  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v6
        name: Checkout
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '26'
          cache: 'gradle'
          cache-dependency-path: |
            **/*.gradle.kts
            **/gradle.properties
            **/libs.versions.toml
      - name: Build server
        run: ./gradlew :api:buildFatJar --no-daemon
      - name: Rename artifact
        run: mv api/build/libs/api-all.jar server.jar
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: server.jar
          name: server.jar

  build-docker:
    runs-on: ubuntu-latest
    needs: [build-web, build-server]
    steps:
      - uses: actions/checkout@v6
        name: Checkout
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: juliusbabies/werkbank-cloud
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Download artifacts
        uses: actions/download-artifact@v7
      - name: Build Docker image
        run: docker build -t juliusbabies/werkbank-cloud:latest .
      - name: Push Docker image
        run: docker push juliusbabies/werkbank-cloud:latest