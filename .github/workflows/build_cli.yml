name: build_cli.yml
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.*'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build CLI Executable
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            gradle-task: ":cli:linkReleaseExecutableLinuxX64"
            artifact-path: "cli/build/bin/linuxX64/releaseExecutable/cli.kexe"
            mosaic-native-target: "LinuxX64"

          - os: ubuntu-latest
            name: linux-arm64
            gradle-task: ":cli:linkReleaseExecutableLinuxArm64"
            artifact-path: "cli/build/bin/linuxArm64/releaseExecutable/cli.kexe"
            mosaic-native-target: "LinuxArm64"

          - os: macos-latest
            name: macos-arm64
            gradle-task: ":cli:linkReleaseExecutableMacosArm64"
            artifact-path: "cli/build/bin/macosArm64/releaseExecutable/cli.kexe"
            mosaic-native-target: "MacosArm64"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '26'
          cache: 'gradle'
          cache-dependency-path: |
            **/*.gradle.kts
            **/*.gradle
            **/gradle.properties
            **/libs.versions.toml

      - name: Get mosaic submodule commit hash
        id: mosaic-hash
        run: echo "hash=$(git ls-tree HEAD mosaic | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache Mosaic prebuilt artifacts
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/com/jakewharton/mosaic
          key: mosaic-${{ runner.os }}-${{ steps.mosaic-hash.outputs.hash }}

      - name: Configure
        run: |
          echo "cli.dev=false" >> local.properties
          echo "cli.version=${{ github.ref_name }}" >> local.properties

      - name: Precompile Mosaic
        working-directory: ./mosaic
        run: |
          ./gradlew publishKotlinMultiplatformPublicationToMavenLocal publish${{ matrix.mosaic-native-target }}PublicationToMavenLocal \
            -PsignAllPublications=false \
            -x :mosaic-tty:jvmJniZigBuild \
            -x spotlessKotlinCheck -x spotlessKotlinApply \
            -x dokkaHtml -x dokkaJavadoc -x dokkaGfm \
            -x apiCheck \
            --no-daemon

      - name: Build CLI
        run: ./gradlew ${{ matrix.gradle-task }} --no-daemon

      - run: mkdir out

      - name: Rename artifact
        run: mv ${{ matrix.artifact-path }} out/cli-${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.name }}
          path: out/cli-${{ matrix.name }}

  generate-metadata:
    name: Generate Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Create metadata
        run: |
          cat << 'EOF' > cli-metadata.json
          {
            "version": "${{ github.ref_name }}"
          }
          EOF

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-metadata
          path: cli-metadata.json
      - name: Upload metadata
        uses: actions/upload-artifact@v7
        with:
          name: cli-metadata
          path: cli-metadata.json

  release:
    name: Create Release
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7

      - name: Run CLI update webhook
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.WEBHOOK_CLI_UPDATE }}" https://wbspace.app/api/webhook/github/cli/release?run_id=${{ github.run_id }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: cli-*/**/*
          draft: false
          prerelease: false
          make_latest: true
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
